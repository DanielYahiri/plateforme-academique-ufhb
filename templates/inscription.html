{% extends "base.html" %}
{% block title %}Inscription — Plateforme Académique{% endblock %}

{% block content %}
<div class="form-page-container">

  <div class="form-hero" style="background:linear-gradient(135deg,#1A5276,#2E86C1);">
    <h1><i class="fas fa-user-pen"></i> Créer un compte</h1>
    <p>Rejoignez la plateforme académique de l'UFHB.</p>
  </div>

  <div class="form-card">
    <div id="formAlert" class="form-alert hidden"></div>

    <form id="inscriptionForm" onsubmit="submitInscription(event)">

      <div class="form-grid-2">
        <div class="form-group">
          <label>Nom <span class="req">*</span></label>
          <input type="text" name="nom" required placeholder="Votre nom de famille">
        </div>
        <div class="form-group">
          <label>Prénoms <span class="req">*</span></label>
          <input type="text" name="prenoms" required placeholder="Vos prénoms">
        </div>
      </div>

      <div class="form-group">
        <label>Adresse email <span class="req">*</span></label>
        <input type="email" name="email" required placeholder="email@exemple.com">
      </div>

      <div class="form-grid-2">
        <div class="form-group">
          <label>Mot de passe <span class="req">*</span></label>
          <input type="password" name="mot_de_passe" id="mdp" required
                 placeholder="Minimum 6 caractères">
        </div>
        <div class="form-group">
          <label>Confirmer le mot de passe <span class="req">*</span></label>
          <input type="password" name="mdp_confirm" id="mdp_confirm" required
                 placeholder="Répétez le mot de passe">
        </div>
      </div>

      <!-- Barre de force du mot de passe -->
      <div class="mdp-force-wrap">
        <div class="mdp-force-bar" id="forceBar"></div>
      </div>
      <p class="mdp-force-label" id="forceLabel"></p>

      <button type="submit" class="btn btn-primary btn-lg btn-full" id="submitBtn">
  <i class="fas fa-user-plus"></i> Créer mon compte
</button>

      <p style="text-align:center;margin-top:18px;font-size:13px;color:#7F8C8D;">
        Déjà inscrit ? <a href="/connexion" style="color:#2E86C1;font-weight:600;">Se connecter</a>
      </p>

    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
// Indicateur de force du mot de passe
document.getElementById('mdp').addEventListener('input', function() {
  const val = this.value;
  const bar = document.getElementById('forceBar');
  const lbl = document.getElementById('forceLabel');
  let force = 0;
  if (val.length >= 6)  force++;
  if (val.length >= 10) force++;
  if (/[A-Z]/.test(val)) force++;
  if (/[0-9]/.test(val)) force++;
  if (/[^A-Za-z0-9]/.test(val)) force++;

  const niveaux = [
    { w: '0%',   c: '#transparent', t: '' },
    { w: '25%',  c: '#E74C3C', t: 'Très faible' },
    { w: '50%',  c: '#F39C12', t: 'Faible' },
    { w: '75%',  c: '#F1C40F', t: 'Moyen' },
    { w: '90%',  c: '#2ECC71', t: 'Fort' },
    { w: '100%', c: '#1E8449', t: 'Très fort' },
  ];
  const n = niveaux[force] || niveaux[0];
  bar.style.width      = n.w;
  bar.style.background = n.c;
  lbl.textContent      = n.t;
  lbl.style.color      = n.c;
});

async function submitInscription(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const mdp  = document.getElementById('mdp').value;
  const conf = document.getElementById('mdp_confirm').value;

  if (mdp !== conf) {
    showAlert('error', '❌ Les mots de passe ne correspondent pas.');
    return;
  }
  if (mdp.length < 6) {
    showAlert('error', '❌ Le mot de passe doit contenir au moins 6 caractères.');
    return;
  }

  btn.disabled = true;
  btn.textContent = "⏳ Inscription en cours…";

  const fd   = new FormData(e.target);
  const body = {
    nom:          fd.get('nom'),
    prenoms:      fd.get('prenoms'),
    email:        fd.get('email'),
    mot_de_passe: fd.get('mot_de_passe'),
    role:         'visiteur'
  };

  try {
    const r = await fetch('/api/auth/inscription', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    });
    const data = await r.json();
    if (r.ok) {
      showAlert('success', '✅ ' + data.message);
      e.target.reset();
      setTimeout(() => location.href = '/connexion', 2000);
    } else {
      showAlert('error', '❌ ' + (data.detail || 'Erreur.'));
    }
  } catch {
    showAlert('error', '❌ Impossible de contacter le serveur.');
  } finally {
    btn.disabled = false;
    btn.textContent = "📝 Créer mon compte";
  }
}

function showAlert(type, msg) {
  const el = document.getElementById('formAlert');
  el.className = 'form-alert form-alert-' + type;
  el.textContent = msg;
  el.scrollIntoView({behavior: 'smooth', block: 'center'});
}
</script>
{% endblock %}
